<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать транзакцию</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Редактировать транзакцию</h1>

        <nav>
            <a href="/">Главная</a>
            <a href="/categories">Категории</a>
            <a href="/add_transaction">Добавить транзакцию</a>
            <a href="/transactions">Все транзакции</a>
            <a href="/monthly_report">Отчёт за месяц</a>
            <a href="/analytics">Аналитика</a>
        </nav>

        <form method="post">
            <label>Сумма:</label>
            <input
                type="number"
                step="0.01"
                name="amount"
                value="{{ transaction[1] }}"
                required
            >

            <label>Категория:</label>
            <select name="category_id" required>
                {% for category in categories %}
                    <option
                        value="{{ category[0] }}"
                        {% if category[0] == transaction[2] %}selected{% endif %}
                    >
                        {{ category[1] }} ({{ category[2] }})
                    </option>
                {% endfor %}
            </select>

            <label>Дата:</label>
            <input
                type="date"
                name="date"
                value="{{ transaction[3] }}"
                required
            >

            <label>Описание:</label>
            <input
                type="text"
                name="description"
                value="{{ transaction[4] }}"
            >

            <button type="submit">Сохранить изменения</button>
        </form>
    </div>
</body>
</html>
